<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Watercolor PNG Asset Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f7f3ef;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-size:36px;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:25px;
}

.label{
font-size:13px;
font-weight:600;
margin-top:15px;
margin-bottom:6px;
}

input, textarea, select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Poppins';
font-size:14px;
}

textarea{
min-height:100px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff7a7a,#ffb86c);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
}

.copy{
background:#4CAF50;
}

.section-title{
margin-top:25px;
font-size:18px;
font-weight:700;
}

.result{
margin-top:10px;
background:#fafafa;
padding:20px;
border-radius:14px;
white-space:pre-line;
line-height:1.6;
border:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<h1>🎨 Luxury Watercolor PNG Asset Generator</h1>

<div class="sub">
Generate premium Etsy-quality watercolor PNG prompts optimized for Flow & Gemini
</div>

<div class="label">Theme / Occasion</div>
<input id="theme" placeholder="Berry First Birthday">

<div class="label">Aesthetic / Vibe</div>
<select id="style">
<option>Coquette</option>
<option>Feminine</option>
<option>Boho</option>
<option>Rustic</option>
<option>Farmhouse</option>
<option>Cottagecore</option>
<option>Whimsical</option>
<option>Kawaii</option>
<option>Luxury</option>
<option>Vintage</option>
<option>Storybook</option>
<option>Christian</option>
<option>Woodland</option>
<option>French Country</option>
<option>Shabby Chic</option>
<option>Romantic</option>
<option>Preppy</option>
<option>Y2K</option>
<option>Minimalist</option>
<option>Modern</option>
</select>

<div class="label">Art Medium</div>
<select id="art">
<option>Watercolor</option>
<option>Digital Painting</option>
<option>Storybook Illustration</option>
<option>Hand Painted</option>
<option>Gouache</option>
<option>Oil Painting</option>
<option>Colored Pencil</option>
<option>Marker Illustration</option>
<option>Ink Illustration</option>
<option>Mixed Media</option>
<option>Vector Art</option>
<option>Pastel Illustration</option>
</select>

<div class="label">Render Style</div>
<select id="render">
<option>Hand Painted</option>
<option>Storybook Quality</option>
<option>Kawaii Glossy</option>
<option>Luxury Realistic</option>
<option>Soft Realistic Shading</option>
<option>Cute Cartoon</option>
<option>Semi Realistic</option>
<option>Professional Clipart Style</option>
<option>Highly Detailed</option>
<option>3D Cute Render</option>
</select>

<div class="label">Items To Include</div>
<textarea id="items" placeholder="strawberries, bows, cupcakes"></textarea>

<div class="label">Negative Prompt</div>
<textarea id="negative" placeholder="text, labels, typography, scene, composition, mockup, sticker sheet"></textarea>

<button onclick="generate()">✨ Generate Premium Prompts</button>

<div class="section-title">✨ Standard Etsy Prompt</div>
<div class="result" id="output1"></div>

<div class="section-title">💎 Premium Best Seller Prompt</div>
<div class="result" id="output2"></div>

<div class="section-title">🔥 Luxury Viral Prompt</div>
<div class="result" id="output3"></div>

<button class="copy" onclick="copyAll()">📋 Copy All Prompts</button>

</div>

<script>
function generate(){

let theme = document.getElementById("theme").value;
let style = document.getElementById("style").value;
let art = document.getElementById("art").value;
let render = document.getElementById("render").value;
let items = document.getElementById("items").value;
let negative = document.getElementById("negative").value;

let prompt1 = `
Luxury ${art} PNG assets inspired by "${theme}",
individual isolated elements only: ${items},
${style} aesthetic,
${render},
hand painted texture,
premium Etsy clipart quality,
each element separated with generous whitespace,
isolated objects only,
no overlapping elements,
no scene,
no arrangement,
no composition,
transparent PNG,
clean cut edges,
high detail,
commercial quality.

Negative instructions:
${negative}
`;

let prompt2 = `
Premium Etsy best-selling ${art} PNG asset bundle inspired by "${theme}",
create separate isolated objects only: ${items},
luxury hand painted artwork,
${style} aesthetic,
${render},
vintage storybook illustration quality,
soft realistic shadows,
highly detailed watercolor texture,
each object spaced apart individually,
commercial seller quality,
isolated elements only,
transparent PNG,
clean edges,
professional Etsy listing quality.

Negative instructions:
${negative}
`;

let prompt3 = `
Luxury viral watercolor PNG collection inspired by "${theme}",
create separate isolated assets: ${items},
premium hand painted watercolor,
${style} aesthetic,
${render},
realistic watercolor bleeding,
extremely detailed,
soft premium color palette,
each item spaced apart,
commercial quality,
transparent PNG,
isolated objects only,
top Etsy seller quality.

Negative instructions:
${negative}
`;

document.getElementById("output1").innerText = prompt1;
document.getElementById("output2").innerText = prompt2;
document.getElementById("output3").innerText = prompt3;
}

function copyAll(){
let allText =
"STANDARD PROMPT:\n\n" +
document.getElementById("output1").innerText +
"\n\n\nPREMIUM PROMPT:\n\n" +
document.getElementById("output2").innerText +
"\n\n\nVIRAL PROMPT:\n\n" +
document.getElementById("output3").innerText;

navigator.clipboard.writeText(allText);
alert("All prompts copied successfully! ✨");
}
</script>

</body>
</html>
