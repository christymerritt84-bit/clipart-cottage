<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h1>🚨 TEST VERSION 🚨</h1>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f7f3ef;
padding:30px;
}

.container{
max-width:850px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-size:38px;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:25px;
}

.label{
font-size:13px;
font-weight:600;
margin-top:15px;
margin-bottom:6px;
}

input, textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Poppins';
}

textarea{
min-height:120px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff7a7a,#ffb86c);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
}

.copy{
background:#4CAF50;
}

.section-title{
margin-top:25px;
font-size:18px;
font-weight:700;
}

.result{
margin-top:10px;
background:#fafafa;
padding:20px;
border-radius:14px;
white-space:pre-line;
line-height:1.6;
border:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>✨ Clipart Generator PRO</h1>

<div class="sub">
Create premium clipart prompts for Etsy, Canva & AI art tools
</div>

<div class="label">Theme / Occasion</div>
<input id="theme" placeholder="Berry First Birthday">

<div class="label">Style (vibe)</div>
<input id="style" placeholder="coquette, feminine, soft, boho">

<div class="label">Art Style (medium)</div>
<input id="art" placeholder="watercolor, digital painting">

<div class="label">Render Style</div>
<input id="render" placeholder="kawaii glossy, realistic shading">

<div class="label">Items To Include</div>
<textarea id="items" placeholder="strawberries, cupcakes, bows"></textarea>

<button onclick="generate()">✨ Generate 3 Premium Prompts</button>

<div class="section-title">✨ Standard Etsy Prompt</div>
<div class="result" id="output1"></div>

<div class="section-title">💎 Premium Best-Seller Prompt</div>
<div class="result" id="output2"></div>

<div class="section-title">🔥 Viral Trending Prompt</div>
<div class="result" id="output3"></div>

<button class="copy" onclick="copyAll()">📋 Copy All Prompts</button>

</div>

<script>

function generate(){

let theme = document.getElementById("theme").value;
let style = document.getElementById("style").value;
let art = document.getElementById("art").value;
let render = document.getElementById("render").value;
let items = document.getElementById("items").value;

let prompt1 = `
A highly detailed ${art} clipart collection based on "${theme}",
featuring ${items},
in a ${style} aesthetic,
rendered in ${render} style,
ultra detailed, 4k, clean edges,
transparent PNG, no background.
`;

let prompt2 = `
Premium Etsy best-selling ${art} clipart collection inspired by "${theme}",
featuring ${items},
luxury composition, professional shading,
commercial-quality artwork,
high-end color palette,
extremely detailed isolated elements,
transparent PNG, no background,
perfect for Etsy product listings.
`;

let prompt3 = `
Viral trending ${art} clipart collection based on "${theme}",
featuring ${items},
eye-catching composition,
bright engaging colors,
social-media worthy aesthetic,
cute trendy design,
ultra detailed 8k quality,
transparent PNG, no background,
created for maximum visual impact.
`;

document.getElementById("output1").innerText = prompt1;
document.getElementById("output2").innerText = prompt2;
document.getElementById("output3").innerText = prompt3;

}

function copyAll(){

let allText =
"STANDARD PROMPT:\n\n" +
document.getElementById("output1").innerText +

"\n\n\nPREMIUM PROMPT:\n\n" +
document.getElementById("output2").innerText +

"\n\n\nVIRAL PROMPT:\n\n" +
document.getElementById("output3").innerText;

navigator.clipboard.writeText(allText);

alert("All prompts copied! ✨");

}

</script>

</body>
</html>
