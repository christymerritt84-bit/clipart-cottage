<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Creator Pro</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5efe6;
padding:30px;
color:#3b2f25;
}
.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1{
text-align:center;
color:#b08d57;
}
label{
display:block;
font-weight:bold;
margin-top:12px;
}
input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-top:6px;
box-sizing:border-box;
}
textarea{min-height:120px;}
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#b08d57;
color:white;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:10px;
padding:15px;
background:#faf7f2;
border:1px solid #e5d8c5;
border-radius:12px;
white-space:pre-wrap;
}
.section{margin-top:25px;}
</style>
</head>
<body>

<div class="container">
<h1>✨ Cover Creator Pro ✨</h1>

<label>Book Type</label>
<select id="bookType">
<option>Journal</option>
<option>Prayer Journal</option>
<option>Gratitude Journal</option>
<option>Planner</option>
<option>Coloring Book</option>
<option>Magazine</option>
<option>Workbook</option>
<option>Cookbook</option>
<option>Children's Book</option>
<option>Notebook</option>
</select>

<label>Cover Type</label>
<select id="coverType">
<option>Front Cover</option>
<option>Back Cover</option>
<option>Full Wraparound Cover</option>
</select>

<label>Audience</label>
<select id="audience">
<option>Women</option>
<option>Men</option>
<option>Teen Girls</option>
<option>Teen Boys</option>
<option>Kids</option>
<option>Christian Women</option>
<option>Entrepreneurs</option>
</select>

<label>Theme</label>
<input id="theme" placeholder="Faith, Butterflies, Sunflowers">

<label>Style</label>
<input id="style" placeholder="Luxury, Coquette, Watercolor">

<label>Color Palette</label>
<input id="colors" placeholder="Beige, Cream, Gold">

<label>Title</label>
<input id="title" placeholder="Spending Time With Jesus">

<label>Subtitle</label>
<input id="subtitle" placeholder="A Journey of Thankfulness">

<label>Brand Name</label>
<input id="brand" placeholder="Christy's Creations">

<label>Website</label>
<input id="website" placeholder="shopchristyscreations.store">

<label>Elements To Include</label>
<textarea id="elements" placeholder="Florals, bows, candles, bible, coffee"></textarea>

<button onclick="generate()">✨ Generate 5 Premium Prompts</button>

<div class="section"><h3>✨ Amazon KDP Prompt</h3><div class="result" id="out1"></div></div>
<div class="section"><h3>💎 Etsy Best Seller Prompt</h3><div class="result" id="out2"></div></div>
<div class="section"><h3>🔥 Magazine Cover Prompt</h3><div class="result" id="out3"></div></div>
<div class="section"><h3>📚 Back Cover Prompt</h3><div class="result" id="out4"></div></div>
<div class="section"><h3>🎀 Full Wraparound Prompt</h3><div class="result" id="out5"></div></div>

<button onclick="copyAll()">📋 Copy All Prompts</button>
</div>

<script>
function generate(){

let b=document.getElementById("bookType").value;
let c=document.getElementById("coverType").value;
let a=document.getElementById("audience").value;
let t=document.getElementById("theme").value;
let s=document.getElementById("style").value;
let col=document.getElementById("colors").value;
let ti=document.getElementById("title").value;
let sub=document.getElementById("subtitle").value;
let br=document.getElementById("brand").value;
let w=document.getElementById("website").value;
let e=document.getElementById("elements").value;

out1.innerText=`Professional ${b} ${c} design.

Title: "${ti}"
Subtitle: "${sub}"

Brand: "${br}"
Website: "${w}"

Theme: ${t}
Audience: ${a}
Style: ${s}
Color Palette: ${col}

Include:
${e}

Amazon KDP ready, clean typography, luxury layout, high resolution, print-ready.`;

out2.innerText=`Luxury Etsy best-selling ${b} cover.

Title: "${ti}"
Subtitle: "${sub}"

Brand: "${br}"
Website: "${w}"

Theme: ${t}
Audience: ${a}

Premium ${s} aesthetic, ${col} palette, commercial-quality artwork, elegant typography, ultra detailed.`;

out3.innerText=`Magazine-quality ${b} cover.

Title: "${ti}"
Subtitle: "${sub}"

Brand: "${br}"
Website: "${w}"

Theme: ${t}

Editorial layout, luxury publishing aesthetic, premium typography, ${col} palette, ultra detailed.`;

out4.innerText=`Matching back cover for "${ti}".

Brand: ${br}
Website: ${w}

Coordinate with front cover theme ${t}.

Include:
${e}

Space for description, cohesive branding, elegant design elements.`;

out5.innerText=`Full wraparound ${b} cover.

Title: "${ti}"
Subtitle: "${sub}"

Brand: ${br}
Website: ${w}

Theme: ${t}
Audience: ${a}
Style: ${s}
Colors: ${col}

Elements:
${e}

Create front cover, spine, and back cover. Amazon KDP ready, premium publishing quality.`;
}

function copyAll(){
const text=[out1.innerText,out2.innerText,out3.innerText,out4.innerText,out5.innerText].join("\n\n");
navigator.clipboard.writeText(text);
alert("All prompts copied!");
}
</script>

</body>
</html>
