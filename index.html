<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipart Prompt Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f7f3ef;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:25px;
}

.label{
font-size:13px;
font-weight:600;
margin-top:15px;
margin-bottom:6px;
}

input, textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Poppins';
}

textarea{
min-height:100px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#4CAF50;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:25px;
background:#fafafa;
padding:20px;
border-radius:14px;
white-space:pre-line;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h1>Clipart Prompt Generator</h1>

<div class="sub">
Generate professional watercolor clipart prompts ✨
</div>

<div class="label">Theme / Occasion</div>
<input id="theme" placeholder="ex: Berry First Birthday">

<div class="label">Style</div>
<input id="style" placeholder="ex: coquette, boho, feminine">

<div class="label">Art Style</div>
<input id="art" placeholder="ex: watercolor, vintage illustration">

<div class="label">Items To Include</div>
<textarea id="items" placeholder="ex: bows, cupcakes, strawberries, balloons"></textarea>

<button onclick="generate()">Generate Prompt</button>

<div class="result" id="output"></div>

</div>

<script>

function generate(){

let theme = document.getElementById("theme").value;
let style = document.getElementById("style").value;
let art = document.getElementById("art").value;
let items = document.getElementById("items").value;

let prompt = `

A cohesive ${art} clipart collection designed around "${theme}",

featuring ${items},

in a ${style} aesthetic,

hand painted, soft watercolor textures,
high resolution PNG,
transparent background,

all elements separated and evenly spaced,
clean composition, minimal shadows,
professional commercial use clipart set,

storybook quality, soft color blending,
Etsy bestseller style,
4k ultra detailed.

`;

document.getElementById("output").innerText = prompt;

}

</script>

</body>
</html>
