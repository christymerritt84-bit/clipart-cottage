function val(id){
return document.getElementById(id).value;
}

function syncTheme(){

let theme =
document.getElementById("theme").value;

let elements =
document.getElementById("elements");

elements.innerHTML = "";

themeElements[theme].forEach(function(item){

let option =
document.createElement("option");

option.text = item;

elements.add(option);

});


// AUTO MATCHING SETTINGS

let palette =
document.getElementById("palette");

let layout =
document.getElementById("layout");

let details =
document.getElementById("details");

let style =
document.getElementById("style");


// HONEY
if(theme.includes("Honey")){

palette.value =
"Honey Gold and Cream";

layout.value =
"premium Etsy clipart arrangement";

details.value =
"soft whimsical aesthetic";

style.value =
"Vintage Nursery Watercolor";

}


// SAFARI
else if(theme.includes("Safari")){

"Earthy Boho";

"premium Etsy clipart arrangement";

"cohesive matching illustration set";

function generatePrompt(){

let theme = val("theme");
let elements = val("elements");
let style = val("style");
let palette = val("palette");
let layout = val("layout");
let details = val("details");
let background = val("background");
let finish = val("finish");
let custom = val("custom");

let prompt = `
A cohesive watercolor clipart collection sheet featuring ${theme.toLowerCase()}, ${elements},

${style},
${palette} color palette,

hand painted watercolor textures,
commercial clipart design,
cute whimsical aesthetic,
soft vintage storybook style,

all elements separated and evenly spaced,
${layout},
isolated on ${background},

matching cohesive illustration collection,
transparent PNG style,
professional printable quality,
delicate ink outlines,
minimal soft shadows,
high detail watercolor clipart,
clean edges,
airy composition,
Etsy bestseller aesthetic,
4k ultra detailed,

${details},
${finish}.

${custom ? "Additional elements: " + custom + "." : ""}
`;

document.getElementById("result").innerText = prompt;

updatePreview(theme);

}

function updatePreview(theme){

let img =
document.getElementById("previewImg");

if(theme.includes("Honey")){
img.src =
"https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=1200&auto=format&fit=crop";
}

else if(theme.includes("Cowboy")){
img.src =
"https://images.unsplash.com/photo-1516467508483-a7212febe31a?q=80&w=1200&auto=format&fit=crop";
}

else if(theme.includes("Rose")){
img.src =
"https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1200&auto=format&fit=crop";
}

else if(theme.includes("Ice Cream")){
img.src =
"https://images.unsplash.com/photo-1563805042-7684c019e1cb?q=80&w=1200&auto=format&fit=crop";
}

else if(theme.includes("Safari")){
img.src =
"https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1200&auto=format&fit=crop";
}

else{
img.src =
"https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200&auto=format&fit=crop";
}

}

function copyPrompt(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
);

alert("Prompt copied ✨");

}

function downloadPrompt(){

let text =
document.getElementById("result").innerText;

let blob =
new Blob([text],{type:"text/plain"});

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"premium-watercolor-clipart-prompt.txt";

a.click();

}


// INITIAL LOAD
syncTheme();
