<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎨 Clipart Cottage</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff7fb;
padding:40px;
color:#444;
}

.container{
max-width:1450px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:60px;
font-weight:700;
color:#ff4fa0;
margin-bottom:12px;
}

.header p{
font-size:18px;
color:#777;
}

.generator{
display:grid;
grid-template-columns:1fr 420px;
gap:30px;
align-items:start;
}

.panel{
background:white;
border-radius:35px;
padding:35px;
box-shadow:0 10px 40px rgba(255,105,180,.08);
border:2px solid #ffe1ef;
}

.preview-panel{
position:sticky;
top:20px;
}

.section{
margin-bottom:30px;
}

.section-title{
font-size:24px;
font-weight:700;
margin-bottom:16px;
color:#ff4fa0;
}

select{
width:100%;
padding:16px;
border-radius:18px;
border:2px solid #ffd8ea;
font-size:16px;
background:white;
font-family:inherit;
outline:none;
}

textarea{
width:100%;
height:320px;
border:none;
outline:none;
resize:none;
background:#fff8fc;
border-radius:25px;
padding:25px;
font-size:15px;
line-height:1.8;
border:2px solid #ffe1ef;
margin-top:25px;
font-family:inherit;
}

.button-group{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:25px;
}

button{
border:none;
padding:16px 28px;
border-radius:18px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.generate-btn{
background:linear-gradient(135deg,#ff4fa0,#ff8ec2);
color:white;
flex:1;
}

.copy-btn{
background:white;
border:2px solid #ffd8ea;
color:#ff4fa0;
}

.preview{
background:#fff7fb;
border-radius:30px;
padding:20px;
border:2px dashed #ffd8ea;
}

.preview img{
width:100%;
border-radius:25px;
display:block;
height:520px;
object-fit:cover;
}

.badges{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:18px;
justify-content:center;
}

.badge{
background:#fff;
border:2px solid #ffd8ea;
padding:10px 14px;
border-radius:999px;
font-size:12px;
font-weight:600;
color:#ff4fa0;
}

.footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#999;
}

@media(max-width:1000px){

.generator{
grid-template-columns:1fr;
}

.preview-panel{
position:relative;
top:0;
}

.header h1{
font-size:42px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🎨 Clipart Cottage</h1>
<p>Create premium cohesive watercolor clipart collections ✨</p>
</div>

<div class="generator">

<!-- LEFT -->
<div class="panel">

<div class="section">

<div class="section-title">
Collection Theme
</div>

<select id="collectionTheme">

<option>Honey Bears</option>
<option>Baby Safari</option>
<option>Cowboy</option>
<option>Ice Cream</option>
<option>Roses</option>
<option>Farm Animals</option>
<option>Fairy Garden</option>
<option>Ballet Bows</option>

</select>

</div>

<div class="button-group">

<button class="generate-btn" onclick="generatePrompt()">
✨ Generate Premium Prompt
</button>

<button class="copy-btn" onclick="copyPrompt()">
📋 Copy Prompt
</button>

</div>

<textarea id="output"></textarea>

</div>

<!-- RIGHT -->
<div class="panel preview-panel">

<div class="preview">

<img
id="previewImage"
src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">

</div>

<div class="badges">

<div class="badge">✨ Etsy Ready</div>
<div class="badge">🎨 Watercolor</div>
<div class="badge">🖼 PNG Clipart</div>
<div class="badge">💖 Storybook Style</div>

</div>

<div class="footer">
Built for creators making dreamy printable products 💛
</div>

</div>

</div>

</div>

function generatePrompt(){

const theme =
document.getElementById("collectionTheme").value;

const collection =
collections[theme];

const randomElements =
collection.elements
.sort(() => 0.5 - Math.random())
.slice(0,10)
.join(", ");

const prompt =

`A highly detailed watercolor clipart collection sheet featuring:

${randomElements},

${collection.vibe},
cohesive matching collection,
premium Etsy clipart quality,
soft watercolor textures,
storybook illustration style,
isolated on white background,
matching aesthetic filler elements,
professional printable PNG clipart,
${collection.palette},
adorable whimsical composition,
high resolution,
hand painted watercolor appearance,
clean soft shadows,
beautiful cohesive arrangement,
premium nursery clipart aesthetic,
watercolor floral accents,
soft pastel detailing.`;

document.getElementById("output").value =
prompt;

updatePreview(theme);

}

function updatePreview(theme){

const img =
document.getElementById("previewImage");

img.src =
collections[theme].preview;

}

function copyPrompt(){

const text =
document.getElementById("output");

text.select();

document.execCommand("copy");

alert("Prompt copied ✨");

}

generatePrompt();
