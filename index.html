<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Clipart Generator AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f7f3ef;
padding:30px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-size:32px;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:25px;
}

.label{
font-size:13px;
font-weight:600;
margin-top:15px;
margin-bottom:6px;
}

input, textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Poppins';
}

textarea{
min-height:100px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff7a7a,#ffb86c);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
}

.result{
margin-top:25px;
background:#fafafa;
padding:20px;
border-radius:14px;
white-space:pre-line;
line-height:1.6;
}

.copy{
background:#4CAF50;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 Clipart Generator AI</h1>

<div class="sub">
Create HIGH-CONVERTING clipart prompts (no limits ✨)
</div>

<div class="label">Theme / Occasion</div>
<input id="theme" placeholder="ex: Berry First Birthday">

<div class="label">Style (vibe)</div>
<input id="style" placeholder="ex: coquette, feminine, soft, boho">

<div class="label">Art Style (medium)</div>
<input id="art" placeholder="ex: watercolor, digital painting, ink">

<div class="label">Render Style (IMPORTANT)</div>
<input id="render" placeholder="ex: kawaii glossy, realistic shading, flat, storybook">

<div class="label">Items To Include</div>
<textarea id="items" placeholder="ex: strawberries, cupcakes, bows, balloons"></textarea>

<button onclick="generate()">✨ Generate Fire Prompt</button>

<button class="copy" onclick="copyPrompt()">📋 Copy Prompt</button>

<div class="result" id="output"></div>

</div>

<script>

function generate(){

let theme = document.getElementById("theme").value;
let style = document.getElementById("style").value;
let art = document.getElementById("art").value;
let render = document.getElementById("render").value;
let items = document.getElementById("items").value;

// 🔥 SMART STYLE BOOSTING
let renderBoost = `
ultra detailed, high resolution, 4k,
clean edges, professional quality,
Etsy bestseller aesthetic,
commercial clipart set
`;

let prompt = `

A highly detailed ${art} clipart collection based on "${theme}",

featuring ${items},

in a ${style} aesthetic,

rendered in ${render} style,

${renderBoost},

soft lighting, smooth shading,
high detail textures,

all elements separated and evenly spaced,
balanced composition,

transparent PNG style,
clean cutout, no background,

professional, polished, high quality output.

no blur, no messy edges, no dull colors

`;

document.getElementById("output").innerText = prompt;

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
alert("Copied 🔥");
}

</script>

</body>
</html>
